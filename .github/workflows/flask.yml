name: Flask app API

on:
  push:
    
jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t flask-app .

      - name: Run Container
        run: docker run -d -p 5000:5000 flask-app

      - name: Wait for API
        run: |
          for i in {1..10}; do
          curl http://localhost:5000 && break
          sleep 2
          done
       

      - name: Test API
        run: curl http://localhost:5000
        #trying again